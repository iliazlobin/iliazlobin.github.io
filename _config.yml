# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: Ilia Zlobin
email: iliazlobin91@gmail.com
description: Professional portfolio and resume of Ilia Zlobin, Principal Software Engineer.
domain: iliazlobin.com
url: https://iliazlobin.com
baseurl: ""
twitter_username: iliazlobin
github_username: iliazlobin
linkedin_username: iliazlobin

# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-redirect-from
header_pages:
  - resume.md
  - portfolio.md
  - designs.md
  - machine-learning.md
  - infrastructure.md
  - blog.md
  - index.md

# System-design write-ups live in their own /designs section (separate from the Blog, which is
# for platform/AI engineering notes and deep dives). Each design is a page at /designs/<slug>/.
collections:
  designs:
    output: true
    permalink: /designs/:name/

# --- Author & social (used by jekyll-seo-tag for meta + JSON-LD) ---
author: Ilia Zlobin
twitter:
  username: iliazlobin
  card: summary_large_image
social:
  name: Ilia Zlobin
  links:
    - https://www.linkedin.com/in/iliazlobin
    - https://github.com/iliazlobin
    - https://twitter.com/iliazlobin
    - https://www.youtube.com/@iliazlobin

# Default Open Graph / Twitter share image for every page (per-page `image:`
# front matter overrides this).
defaults:
  - scope:
      path: ""
    values:
      image: /images/og-default.png


# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
# exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

include:
  - images
